name: Build and Push Docker Image

on:
  push:
    branches: [ "main", "master" ] # 当推送到主分支时触发（根据原项目主分支名修改，通常是 main 或 master）
  workflow_dispatch: # 允许你手动点击按钮触发构建

env:
  REGISTRY: ghcr.io
  # 这里的 IMAGE_NAME 会自动变成 "你的用户名/仓库名"，保持默认即可
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # 必须赋予写入包的权限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 设置 Docker Buildx (用于构建镜像的环境)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 登录到 GitHub Container Registry
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 提取元数据（用于生成标签，例如 :latest, :sha-xxxx）
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      # 构建并推送镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          # 如果 Dockerfile 不在根目录，需要修改这里，例如 ./app/Dockerfile
          file: ./Dockerfile 
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
