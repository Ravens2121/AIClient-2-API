name: 自动构建 Docker 镜像

on:
  # 监听来自 Sync 流程的调度信号
  repository_dispatch:
    types: [trigger-docker-build]
  # 保留手动推送触发
  push:
    分支: [ "main", "master" ]
  # 保留手动按钮触发
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v4
        with:
          # 确保拉取的是最新代码
          ref: 'main'

      - name: 2. 生成版本号 (日期-时分)
        id: date_version
        run: |
          TZ=Asia/Shanghai
          DATE_STR=$(date +'%y%m%d')
          TIME_STR=$(date +'%H%M')
          VERSION="${DATE_STR}-${TIME_STR}"
          echo "本次构建版本: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: 3. 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 4. 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 5. 生成镜像标签
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ env.VERSION }}

      - name: 6. 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
